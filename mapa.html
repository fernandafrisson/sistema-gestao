<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Quarteirões — Vigilância Epidemiológica</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: #F0F2F8;
            color: #3D2D68;
            overflow: hidden; /* Evitar barra de rolagem dupla com o Streamlit */
        }

        /* Header Modernizado */
        .header {
            background: linear-gradient(135deg, #5B4897 0%, #46357A 100%);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(91, 72, 151, 0.2);
            position: relative;
            z-index: 1000;
        }
        .header-title {
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Container do Mapa */
        #map {
            width: 100vw;
            height: calc(100vh - 55px);
            z-index: 1;
        }

        /* Controle de Filtros */
        .leaflet-control-layers {
            border-radius: 12px !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1) !important;
            padding: 6px !important;
            font-family: 'Nunito', sans-serif !important;
            font-weight: 600 !important;
            color: #3D2D68 !important;
            border: none !important;
        }

        /* Label dos quarteirões */
        .quarteirao-label {
            background: rgba(255,255,255,0.95) !important;
            border: 2px solid #FF6B8B !important;
            border-radius: 6px !important;
            padding: 2px 6px !important;
            font-family: 'Nunito', sans-serif !important;
            font-size: 0.75rem !important;
            font-weight: 800 !important;
            color: #5B4897 !important;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15) !important;
            text-align: center;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title">
            🗺️ Mapa Interativo de Quarteirões
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js"></script>

    <script>
        // 1. INICIALIZAÇÃO DO MAPA COM CANVAS (Melhora a performance em 80%)
        var map = L.map('map', {
            preferCanvas: true, // Força renderização no Canvas
            zoomControl: true
        }).setView([-22.8136, -45.1917], 13); // Coordenadas de Guaratinguetá

        // 2. CAMADA BASE DO MAPA (OpenStreetMap)
        var basemap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. VARIÁVEIS PARA ARMAZENAR CAMADAS
        var camadaRuas = L.layerGroup();
        var camadaQuarteiroesPoligonos = L.layerGroup();
        var rotulosQuarteiroes = L.layerGroup(); // Grupo separado apenas para os textos

        // 4. CARREGANDO RUAS (Linhas)
        omnivore.kml('Ruas.kml').on('ready', function() {
            this.eachLayer(function(layer) {
                layer.setStyle({
                    color: '#8C84A4', 
                    weight: 2,
                    opacity: 0.6
                });
                camadaRuas.addLayer(layer);
            });
            // Adiciona as ruas ao mapa inicialmente
            map.addLayer(camadaRuas);
        });

        // 5. CARREGANDO QUARTEIRÕES (Polígonos e Textos)
        omnivore.kml('Quadras de Guará.kml').on('ready', function() {
            this.eachLayer(function(layer) {
                
                // Extrai o nome/número do quarteirão
                var nomeQuarteirao = layer.feature.properties.name;

                // Estiliza o polígono (se existir)
                if (layer.setStyle) {
                    layer.setStyle({
                        color: '#5B4897',
                        fillColor: '#765EBC',
                        fillOpacity: 0.2,
                        weight: 1.5
                    });
                    camadaQuarteiroesPoligonos.addLayer(layer);
                }

                // Cria o Rótulo de texto no centro da feição
                if (nomeQuarteirao) {
                    var centro = layer.getBounds ? layer.getBounds().getCenter() : layer.getLatLng();
                    var rotulo = L.marker(centro, {
                        icon: L.divIcon({
                            className: 'quarteirao-label',
                            html: nomeQuarteirao,
                            iconSize: null
                        }),
                        interactive: false // Essencial para performance: o mouse não precisa ler o texto
                    });
                    rotulosQuarteiroes.addLayer(rotulo);
                }
            });

            // Adiciona os polígonos ao mapa
            map.addLayer(camadaQuarteiroesPoligonos);
            
            // Só adiciona os textos se o mapa já começar com zoom próximo
            if (map.getZoom() >= 16) {
                map.addLayer(rotulosQuarteiroes);
            }
        });

        // 6. CONTROLE DE CAMADAS (Canto Superior Direito)
        var overlayMaps = {
            "Quadras (Área)": camadaQuarteiroesPoligonos,
            "Ruas (Linhas)": camadaRuas
        };
        L.control.layers(null, overlayMaps, { collapsed: false }).addTo(map);

        // 7. LÓGICA DE PERFORMANCE (MOSTRAR/OCULTAR TEXTOS CONFORME O ZOOM)
        // Isso evita o travamento ao afastar o mapa!
        map.on('zoomend', function() {
            var zoomAtual = map.getZoom();
            
            if (zoomAtual >= 16) {
                // Adiciona textos se estiver próximo (zoom >= 16)
                if (!map.hasLayer(rotulosQuarteiroes)) {
                    map.addLayer(rotulosQuarteiroes);
                }
            } else {
                // Remove textos se estiver longe (zoom < 16)
                if (map.hasLayer(rotulosQuarteiroes)) {
                    map.removeLayer(rotulosQuarteiroes);
                }
            }
        });

    </script>
</body>
</html>
