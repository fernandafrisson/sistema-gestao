<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Bairros — Vigilância Epidemiológica</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: #F0F2F8;
            color: #3D2D68;
            overflow: hidden;
        }

        /* Header Modernizado */
        .header {
            background: linear-gradient(135deg, #5B4897 0%, #46357A 100%);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(91, 72, 151, 0.2);
            position: relative;
            z-index: 1000;
        }
        .header-title {
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Container do Mapa */
        #map {
            width: 100vw;
            height: calc(100vh - 55px);
            z-index: 1;
        }

        /* Controle de Filtros */
        .leaflet-control-layers {
            border-radius: 12px !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1) !important;
            padding: 6px !important;
            font-family: 'Nunito', sans-serif !important;
            font-weight: 700 !important;
            color: #3D2D68 !important;
            border: none !important;
        }

        /* Estilo do Texto do Bairro (Sem fundo branco, apenas o texto flutuante com borda branca) */
        .bairro-label {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            font-family: 'Nunito', sans-serif !important;
            font-size: 0.95rem !important;
            font-weight: 800 !important;
            color: #3D2D68 !important;
            /* Cria um contorno branco no texto para facilitar a leitura por cima das cores */
            text-shadow: 
                2px 2px 0 #FFF, 
                -1px -1px 0 #FFF, 
                1px -1px 0 #FFF, 
                -1px 1px 0 #FFF, 
                1px 1px 0 #FFF !important;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title">
            🗺️ Mapa Interativo de Bairros
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js"></script>

    <script>
        // 1. INICIALIZAÇÃO DO MAPA
        var map = L.map('map', {
            preferCanvas: true, 
            zoomControl: true
        }).setView([-22.8136, -45.1917], 13);

        // 2. MAPA BASE
        var basemap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. GRUPOS DE CAMADAS
        var camadaRuas = L.layerGroup();
        var camadaBairros = L.featureGroup();

        // 4. CARREGAR RUAS
        omnivore.kml('Ruas.kml').on('ready', function() {
            this.eachLayer(function(layer) {
                layer.setStyle({ color: '#8C84A4', weight: 2, opacity: 0.6 });
                camadaRuas.addLayer(layer);
            });
            map.addLayer(camadaRuas);
        });

        // 5. LISTA DOS NOVOS ARQUIVOS KML (POLÍGONOS DOS BAIRROS)
        var arquivosBairros = [
            'Pingo de Ouro.kml',
            'Rocinha.kml',
            'São Dimas.kml',
            'São Manoel.kml',
            'Sta Edwirges.kml',
            'Tamandaré.kml',
            'Vista Alegre.kml',
            'Jd do Vale.kml',
            'Jd Esperança.kml'
        ];

        // 6. CARREGAR CADA BAIRRO E APLICAR ESTILO + NOME CENTRALIZADO
        arquivosBairros.forEach(function(arquivo) {
            var layerBairro = omnivore.kml(arquivo).on('ready', function() {
                this.eachLayer(function(layer) {
                    
                    // Extrair nome (se não tiver no KML, usa o nome do arquivo)
                    var nomeBairro = "";
                    if (layer.feature && layer.feature.properties && layer.feature.properties.name) {
                        nomeBairro = layer.feature.properties.name;
                    } else {
                        nomeBairro = arquivo.replace('.kml', '');
                    }

                    // Estilo do Polígono
                    if (layer.setStyle) {
                        layer.setStyle({
                            color: '#5B4897',      // Borda roxa
                            fillColor: '#FF6B8B',  // Preenchimento rosa
                            fillOpacity: 0.25,
                            weight: 2
                        });
                    }

                    // Adicionar Rótulo de Texto Fixo no Centro do Polígono
                    if (layer.bindTooltip) {
                        layer.bindTooltip(nomeBairro, {
                            permanent: true, 
                            direction: "center",
                            className: "bairro-label"
                        });
                    }

                    // Efeito Hover (Brilho ao passar o mouse)
                    layer.on({
                        mouseover: function(e) {
                            var l = e.target;
                            l.setStyle({ fillOpacity: 0.5, weight: 3 });
                        },
                        mouseout: function(e) {
                            var l = e.target;
                            l.setStyle({ fillOpacity: 0.25, weight: 2 });
                        }
                    });

                });
            });
            camadaBairros.addLayer(layerBairro);
        });

        map.addLayer(camadaBairros);

        // 7. CAIXINHA DE FILTROS NO CANTO DIREITO
        var overlayMaps = {
            "Bairros (Polígonos)": camadaBairros,
            "Ruas (Linhas)": camadaRuas
        };
        L.control.layers(null, overlayMaps, { collapsed: false }).addTo(map);

    </script>
</body>
</html>
