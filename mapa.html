<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Bairros — Vigilância Epidemiológica</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: #000; /* Fundo escuro atrás do satélite */
            color: #3D2D68;
            overflow: hidden;
        }

        /* Header Modernizado */
        .header {
            background: linear-gradient(135deg, #5B4897 0%, #46357A 100%);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1000;
        }
        .header-title {
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Container do Mapa */
        #map {
            width: 100vw;
            height: calc(100vh - 55px);
            z-index: 1;
        }

        /* Controle de Filtros */
        .leaflet-control-layers {
            border-radius: 12px !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important;
            padding: 6px !important;
            font-family: 'Nunito', sans-serif !important;
            font-weight: 700 !important;
            color: #3D2D68 !important;
            border: none !important;
        }

        /* Estilo do Texto do Bairro para mapa de Satélite */
        .bairro-label {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            font-family: 'Nunito', sans-serif !important;
            font-size: 1.1rem !important; 
            font-weight: 900 !important;
            color: #FFFFFF !important; /* Texto branco */
            /* Sombra escura forte para dar contraste contra o chão/telhados */
            text-shadow: 
                2px 2px 0 #000, 
                -1px -1px 0 #000, 
                1px -1px 0 #000, 
                -1px 1px 0 #000, 
                1px 1px 0 #000,
                0px 0px 8px rgba(0,0,0,0.9) !important;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title">
            🗺️ Mapa Interativo de Bairros (Satélite)
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js"></script>

    <script>
        // 1. INICIALIZAÇÃO DO MAPA
        var map = L.map('map', {
            preferCanvas: true, 
            zoomControl: true
        }).setView([-22.8136, -45.1917], 13);

        // 2. MAPA BASE SATÉLITE (Esri World Imagery)
        var basemap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19,
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
        }).addTo(map);

        // 3. GRUPOS DE CAMADAS
        var camadaRuas = L.layerGroup();
        var camadaBairros = L.featureGroup();

        // 4. CARREGAR RUAS
        omnivore.kml('Ruas.kml').on('ready', function() {
            this.eachLayer(function(layer) {
                // Linhas amarelas semi-transparentes para contrastar no satélite
                layer.setStyle({ color: '#F1C40F', weight: 2, opacity: 0.6 }); 
                camadaRuas.addLayer(layer);
            });
            map.addLayer(camadaRuas);
        });

        // 5. LISTA DOS ARQUIVOS KML
        var arquivosBairros = [
            'Pingo de Ouro.kml',
            'Rocinha.kml',
            'São Dimas.kml',
            'São Manoel.kml',
            'Sta Edwirges.kml',
            'Tamandaré.kml',
            'Vista Alegre.kml',
            'Jd do Vale.kml',
            'Jd Esperança.kml'
        ];

        // Paleta de cores para colorir os bairros de forma alternada
        var paletaCores = [
            '#FF3366', // Rosa
            '#33CCFF', // Azul claro
            '#00FF66', // Verde
            '#FFFF00', // Amarelo
            '#CC33FF', // Roxo
            '#FF9900', // Laranja
            '#00FFFF', // Ciano
            '#FF3300', // Vermelho
            '#99FF33'  // Verde limão
        ];

        // 6. CARREGAR CADA BAIRRO E APLICAR ESTILO
        arquivosBairros.forEach(function(arquivo, index) {
            
            // Pega uma cor diferente para cada arquivo na lista
            var corPreenchimento = paletaCores[index % paletaCores.length];

            var layerBairro = omnivore.kml(arquivo).on('ready', function() {
                this.eachLayer(function(layer) {
                    
                    var nomeBairro = "";
                    if (layer.feature && layer.feature.properties && layer.feature.properties.name) {
                        nomeBairro = layer.feature.properties.name;
                    } else {
                        nomeBairro = arquivo.replace('.kml', '');
                    }

                    // Estilo de cores
                    if (layer.setStyle) {
                        layer.setStyle({
                            color: '#FFFFFF',      // Borda branca para separar bem
                            fillColor: corPreenchimento, // A cor selecionada na paleta
                            fillOpacity: 0.35,     // 35% de transparência para ver as casas embaixo
                            weight: 2
                        });
                    }

                    // Coloca o texto centralizado
                    if (layer.bindTooltip) {
                        layer.bindTooltip(nomeBairro, {
                            permanent: true, 
                            direction: "center",
                            className: "bairro-label"
                        });
                    }

                    // Efeito ao passar o mouse
                    layer.on({
                        mouseover: function(e) {
                            var l = e.target;
                            l.setStyle({ fillOpacity: 0.65, weight: 3 });
                        },
                        mouseout: function(e) {
                            var l = e.target;
                            l.setStyle({ fillOpacity: 0.35, weight: 2 });
                        }
                    });

                });
            });
            camadaBairros.addLayer(layerBairro);
        });

        map.addLayer(camadaBairros);

        // 7. CAIXINHA DE FILTROS NO CANTO DIREITO (COM O NOVO NOME)
        var overlayMaps = {
            "Área de abrangencia psf": camadaBairros,
            "Ruas (Linhas)": camadaRuas
        };
        L.control.layers(null, overlayMaps, { collapsed: false }).addTo(map);

    </script>
</body>
</html>
