<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Quarteirões — Vigilância Epidemiológica</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: #F0F2F8;
            color: #3D2D68;
            overflow: hidden; /* Evitar barra de rolagem dupla com o Streamlit */
        }

        /* Header Modernizado */
        .header {
            background: linear-gradient(135deg, #5B4897 0%, #46357A 100%);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(91, 72, 151, 0.2);
            position: relative;
            z-index: 1000;
        }
        .header-title {
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Container do Mapa */
        #map {
            width: 100vw;
            height: calc(100vh - 55px);
            z-index: 1;
        }

        /* Controle de Filtros */
        .leaflet-control-layers {
            border-radius: 12px !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1) !important;
            padding: 6px !important;
            font-family: 'Nunito', sans-serif !important;
            font-weight: 600 !important;
            color: #3D2D68 !important;
            border: none !important;
        }

        /* O Segredo do Rótulo sem Ponto (Alfinete) */
        .quarteirao-label {
            background: rgba(255,255,255,0.95) !important;
            border: 2px solid #FF6B8B !important;
            border-radius: 6px !important;
            padding: 2px 6px !important;
            font-family: 'Nunito', sans-serif !important;
            font-size: 0.75rem !important;
            font-weight: 800 !important;
            color: #5B4897 !important;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15) !important;
            text-align: center;
            white-space: nowrap;
            /* Centraliza a caixinha exatamente em cima da coordenada */
            width: fit-content !important;
            height: fit-content !important;
            margin-left: -15px !important; 
            margin-top: -10px !important;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title">
            🗺️ Mapa Interativo de Quarteirões
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js"></script>

    <script>
        // 1. INICIALIZAÇÃO DO MAPA COM CANVAS (Evita o travamento do navegador)
        var map = L.map('map', {
            preferCanvas: true,
            zoomControl: true
        }).setView([-22.8136, -45.1917], 14); // Coordenadas Iniciais

        // 2. MAPA BASE
        var basemap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. GRUPOS PARA GUARDAR AS CAMADAS
        var camadaRuas = L.layerGroup();
        var camadaQuarteiroesPoligonos = L.layerGroup();
        var rotulosQuarteiroes = L.layerGroup(); // Grupo isolado para os textos

        // 4. CARREGAR RUAS
        omnivore.kml('Ruas.kml').on('ready', function() {
            this.eachLayer(function(layer) {
                layer.setStyle({ color: '#8C84A4', weight: 2, opacity: 0.6 });
                camadaRuas.addLayer(layer);
            });
            map.addLayer(camadaRuas);
        });

        // 5. A MÁGICA: REGRA CUSTOMIZADA PARA LER OS QUARTEIRÕES
        var estiloKml = L.geoJson(null, {
            // pointToLayer substitui o Ponto original (alfinete azul) pelo nosso rótulo HTML!
            pointToLayer: function(feature, latlng) {
                if (feature.properties && feature.properties.name) {
                    return L.marker(latlng, {
                        icon: L.divIcon({
                            className: 'quarteirao-label',
                            html: feature.properties.name,
                            iconSize: null // O tamanho fica automático de acordo com o texto
                        }),
                        interactive: false // Essencial: tira eventos de clique do texto, deixando o mapa mais leve
                    });
                }
                return null;
            },
            // Estilo para caso o KML possua também áreas desenhadas (polígonos)
            style: function(feature) {
                return {
                    color: '#5B4897',
                    fillColor: '#765EBC',
                    fillOpacity: 0.2,
                    weight: 1.5
                };
            }
        });

        // 6. CARREGA OS QUARTEIRÕES USANDO A REGRA CRIADA ACIMA
        omnivore.kml('Quadras de Guará.kml', null, estiloKml).on('ready', function() {
            this.eachLayer(function(layer) {
                // Verifica se é o texto (rótulo) ou se é um polígono
                if (layer instanceof L.Marker) {
                    rotulosQuarteiroes.addLayer(layer);
                } else {
                    camadaQuarteiroesPoligonos.addLayer(layer);
                }
            });

            // Adiciona as áreas ao mapa
            map.addLayer(camadaQuarteiroesPoligonos);
            
            // Só exibe os textos de início se o zoom já estiver perto (Zoom >= 16)
            if (map.getZoom() >= 16) {
                map.addLayer(rotulosQuarteiroes);
            }
        });

        // 7. CAIXINHA DE FILTROS NO CANTO DIREITO
        var overlayMaps = {
            "Quadras": camadaQuarteiroesPoligonos,
            "Ruas": camadaRuas
        };
        L.control.layers(null, overlayMaps, { collapsed: false }).addTo(map);

        // 8. CONTROLE ANTI-TRAVAMENTO (SÓ MOSTRA NÚMEROS QUANDO APROXIMAR A TELA)
        map.on('zoomend', function() {
            var zoomAtual = map.getZoom();
            
            // Se chegou perto (16 ou mais), adiciona os rótulos
            if (zoomAtual >= 16) {
                if (!map.hasLayer(rotulosQuarteiroes)) {
                    map.addLayer(rotulosQuarteiroes);
                }
            } else {
                // Se afastou (menos de 16), remove os rótulos para não poluir nem travar
                if (map.hasLayer(rotulosQuarteiroes)) {
                    map.removeLayer(rotulosQuarteiroes);
                }
            }
        });

    </script>
</body>
</html>
